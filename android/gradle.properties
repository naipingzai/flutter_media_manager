org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# 禁用 JDK 镜像生成以解决 Java 21 jlink 兼容性问题
android.experimental.androidTest.useUnifiedTestPlatform=false
# 使用系统 JDK 而不是生成 JDK 镜像
android.gradle.jvm.toolchain.auto.detect=true

# permission_handler 配置
# 允许 MANAGE_EXTERNAL_STORAGE 权限（Android 11+ 全文件访问）
permission_handler.manageExternalStorage=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
