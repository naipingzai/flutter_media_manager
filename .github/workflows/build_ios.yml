# GitHub Actions workflow for building iOS app
# This workflow builds the iOS app using a macOS runner

name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      # Get Flutter version info
      - name: Flutter version
        run: flutter --version

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Run Flutter linter
      - name: Run Flutter linter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Build iOS app for simulator (no code signing required)
      - name: Build iOS App
        run: |
          cd ios
          pod install --repo-update
          cd ..
          flutter build ios --simulator

      # Package .app into a zip for easy download
      - name: Package iOS app
        run: |
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            cd build/ios/iphonesimulator
            zip -r "${APP_NAME}-ios-simulator.zip" "$(basename "$APP_PATH")"
            echo "ZIP created: ${APP_NAME}-ios-simulator.zip"
          fi

      # Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/*.zip
          retention-days: 7
