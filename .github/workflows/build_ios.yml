# GitHub Actions workflow for building iOS app
# This workflow builds the iOS app using a macOS runner

name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      # Get Flutter version info
      - name: Flutter version
        run: flutter --version

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Run Flutter linter
      - name: Run Flutter linter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Install CocoaPods dependencies
      - name: Install pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Build iOS app (no code signing)
      - name: Build iOS app
        run: flutter build ios --release --no-codesign

      # Package .app into unsigned IPA
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Runner-unsigned.ipa Payload
          rm -rf Payload
          echo "IPA created: Runner-unsigned.ipa"

      # Upload IPA artifact
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: Runner-unsigned.ipa
          retention-days: 7
