# GitHub Actions workflow for building iOS app
# This workflow builds the iOS app using a macOS runner

name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      # Get Flutter version info
      - name: Flutter version
        run: flutter --version

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Run Flutter linter
      - name: Run Flutter linter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Install CocoaPods dependencies
      - name: Install pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Build unsigned IPA (no code signing required)
      - name: Build iOS IPA (unsigned)
        run: flutter build ipa --no-codesign

      # Upload IPA artifact
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7

      # Also upload the .app for simulator use
      - name: Build iOS for Simulator
        run: flutter build ios --simulator

      - name: Package .app for simulator
        run: |
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            cd build/ios/iphonesimulator
            zip -r "${APP_NAME}-ios-simulator.zip" "$(basename "$APP_PATH")"
            echo "ZIP created: ${APP_NAME}-ios-simulator.zip"
          fi

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/*.zip
          retention-days: 7
